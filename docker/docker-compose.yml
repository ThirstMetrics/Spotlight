version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spotlight-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: spotlight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spotlight_dev}
      POSTGRES_DB: spotlight
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotlight -d spotlight"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spotlight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: builder
    container_name: spotlight-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://spotlight:${POSTGRES_PASSWORD:-spotlight_dev}@postgres:5432/spotlight
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "packages/db/prisma/schema.prisma"]
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: spotlight-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://spotlight:${POSTGRES_PASSWORD:-spotlight_dev}@postgres:5432/spotlight
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-spotlight_jwt_secret_change_me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NODE_ENV: production

  portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.portal
    container_name: spotlight-portal
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://spotlight:${POSTGRES_PASSWORD:-spotlight_dev}@postgres:5432/spotlight
      JWT_SECRET: ${JWT_SECRET:-spotlight_jwt_secret_change_me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NODE_ENV: production

volumes:
  postgres_data:
  redis_data:
